<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4">
            <div class="flex items-center gap-2 font-bold text-xl tracking-tight text-red-500">
                <i class="fa-solid fa-circle-play text-2xl"></i>
                <span>Cyber<span class="text-white">Jarvis</span></span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-6 md:p-8">

            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-extrabold mb-2 bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                    Download YouTube Videos
                </h1>
                <p class="text-slate-400 text-sm">Paste a YouTube link to get started</p>
            </div>

            <!-- URL Input -->
            <div class="relative flex items-center">
                <span class="absolute left-4 text-slate-400">
                    <i class="fa-solid fa-link"></i>
                </span>
                <input
                    type="url"
                    id="videoUrl"
                    placeholder="https://www.youtube.com/watch?v=..."
                    class="w-full pl-12 pr-32 py-4 bg-slate-900/80 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 text-slate-100 placeholder:text-slate-500"
                >
                <button
                    id="fetchBtn"
                    class="absolute right-2 px-5 py-2.5 bg-red-600 hover:bg-red-500 font-medium rounded-lg text-sm transition-all active:scale-95 flex items-center gap-2"
                >
                    <span>Fetch</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden mt-8 py-8 flex flex-col items-center gap-3">
                <div class="w-10 h-10 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-400 text-sm">Fetching video info...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden mt-6 p-4 bg-red-950/40 border border-red-800/50 rounded-xl text-red-400 text-sm">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i>
                <span id="errorMessage"></span>
            </div>

            <!-- Result State -->
            <div id="resultState" class="hidden mt-8 space-y-6">

                <!-- Video Info Card -->
                <div class="flex gap-4 bg-slate-900/40 p-4 rounded-xl border border-slate-700/30">
                    <div class="relative w-40 aspect-video rounded-lg overflow-hidden bg-slate-800 flex-shrink-0">
                        <img id="videoThumbnail" class="w-full h-full object-cover">
                        <span id="videoDuration" class="absolute bottom-1 right-1 bg-black/70 text-xs px-1.5 py-0.5 rounded">00:00</span>
                    </div>
                    <div class="flex-1">
                        <h3 id="videoTitle" class="font-semibold text-sm line-clamp-2">Title</h3>
                        <p id="videoAuthor" class="text-xs text-slate-400 mt-1">Channel</p>
                    </div>
                </div>

                <!-- Format Options -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Quality:</label>
                    <div id="formatsList" class="space-y-2">
                        <!-- Formats will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Download Progress -->
            <div id="progressContainer" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-slate-700/50">
                <div class="flex justify-between text-xs mb-2">
                    <span class="text-slate-300">Downloading...</span>
                    <span id="progressPercent" class="text-slate-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-red-600 h-full w-0 transition-all duration-300 rounded-full"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;

        const urlInput = document.getElementById('videoUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const errorMessage = document.getElementById('errorMessage');
        const resultState = document.getElementById('resultState');
        const videoThumbnail = document.getElementById('videoThumbnail');
        const videoDuration = document.getElementById('videoDuration');
        const videoTitle = document.getElementById('videoTitle');
        const videoAuthor = document.getElementById('videoAuthor');
        const formatsList = document.getElementById('formatsList');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');

        let currentVideoUrl = '';
        let availableFormats = [];

        fetchBtn.addEventListener('click', fetchVideoInfo);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideoInfo();
        });

        async function fetchVideoInfo() {
            const url = urlInput.value.trim();

            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                showError('Please enter a valid YouTube URL');
                return;
            }

            currentVideoUrl = url;

            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            resultState.classList.add('hidden');
            progressContainer.classList.add('hidden');
            fetchBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('url', url);

                const response = await fetch(`${API_BASE}/video-info`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to fetch video info');
                }

                const data = await response.json();

                // Check if we have data
                if (!data.success) {
                    throw new Error('Invalid response from server');
                }

                displayVideoInfo(data);

            } catch (err) {
                showError(err.message);
            } finally {
                loadingState.classList.add('hidden');
                fetchBtn.disabled = false;
            }
        }

        function displayVideoInfo(info) {
            videoThumbnail.src = info.thumbnail || '';
            videoDuration.textContent = formatDuration(info.duration);
            videoTitle.textContent = info.title;
            videoAuthor.textContent = info.channel || 'Unknown Channel';

            // Store formats for download
            availableFormats = info.formats || [];

            // Generate format buttons
            formatsList.innerHTML = '';

            // Add video formats
            const videoFormats = availableFormats.filter(f => f.has_video);
            videoFormats.forEach(format => {
                formatsList.appendChild(createFormatButton(format, 'video'));
            });

            // Add audio format
            const audioFormat = availableFormats.find(f => !f.has_video && f.has_audio);
            if (audioFormat) {
                formatsList.appendChild(createFormatButton(audioFormat, 'audio'));
            }

            resultState.classList.remove('hidden');
        }

        function createFormatButton(format, type) {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between p-3 bg-slate-900/60 hover:bg-slate-900 border border-slate-700/50 rounded-xl transition-all';

            const quality = format.quality || (format.height ? `${format.height}p` : 'Audio');
            const size = format.filesize ? formatFileSize(format.filesize) : 'Unknown size';
            const ext = format.ext || 'mp4';

            div.innerHTML = `
                <div>
                    <p class="text-sm font-medium text-slate-200">${quality}</p>
                    <p class="text-xs text-slate-400">${ext.toUpperCase()} • ${size}</p>
                </div>
                <button class="download-btn px-4 py-2 bg-slate-800 hover:bg-red-600 rounded-lg text-xs font-semibold transition-all active:scale-95 flex items-center gap-1.5" data-format-id="${format.format_id}" data-type="${type}" data-quality="${quality}">
                    <i class="fa-solid fa-download"></i> Download
                </button>
            `;

            const btn = div.querySelector('.download-btn');
            btn.addEventListener('click', () => downloadVideo(format.format_id, type, quality));

            return div;
        }

        async function downloadVideo(formatId, type, qualityName) {
            if (!currentVideoUrl) return;

            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';

            // Simulate progress (real progress would require more complex setup)
            let progress = 0;
            const interval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 10;
                    progress = Math.min(progress, 90);
                    progressBar.style.width = `${progress}%`;
                    progressPercent.textContent = `${Math.floor(progress)}%`;
                }
            }, 300);

            try {
                const formData = new FormData();
                formData.append('url', currentVideoUrl);
                formData.append('format_id', formatId);
                formData.append('media_type', type);

                const response = await fetch(`${API_BASE}/download`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Download failed');
                }

                const result = await response.json();

                // Complete progress
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';

                setTimeout(() => {
                    alert(`✅ Download complete!\n\nFile saved: ${result.filename}\nLocation: downloads folder`);
                    progressContainer.classList.add('hidden');
                }, 500);

            } catch (err) {
                clearInterval(interval);
                progressContainer.classList.add('hidden');
                showError(`Download failed: ${err.message}`);
            }
        }

        function formatDuration(seconds) {
            if (!seconds) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatFileSize(bytes) {
            if (!bytes) return 'Unknown';
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + sizes[i];
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorState.classList.remove('hidden');
            resultState.classList.add('hidden');
            progressContainer.classList.add('hidden');
            setTimeout(() => {
                errorState.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
